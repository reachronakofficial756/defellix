events {
    worker_connections 1024;
}

http {
    # Logging configuration
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Allowed origins whitelist
    # "" (empty) = unrecognized origin → no CORS header sent → browser blocks request
    map $http_origin $cors_origin {
        default                             "";
        "http://localhost:5173"             "http://localhost:5173";
        "http://localhost:3000"             "http://localhost:3000";
        "https://app.defellix.com"          "https://app.defellix.com";
        "https://defellix.com"              "https://defellix.com";
        "~^http://localhost(:[0-9]+)?$"     $http_origin;
    }

    server {
        listen 80;
        server_name localhost api.defellix.com;

        # Docker embedded DNS — required when using variables in proxy_pass so hostnames
        # are re-resolved after container restarts (avoids stale 172.x.x.x → ECONNREFUSED).
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ---------------------------------------------------------------------------
        # Health Check
        # ---------------------------------------------------------------------------
        location /health {
            default_type application/json;
            return 200 '{"status":"ok", "service":"gateway"}';
        }

        # ---------------------------------------------------------------------------
        # Swagger API Documentation
        # ---------------------------------------------------------------------------
        location /api-docs/ {
            set $upstream_swagger http://swagger-ui:8080;
            proxy_pass $upstream_swagger/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }

        # ---------------------------------------------------------------------------
        # Internal JWT Validation Endpoint (subrequest, never called directly)
        # ---------------------------------------------------------------------------
        location = /auth-verify {
            internal;

            set $upstream_auth_validate http://auth-service:8081/api/v1/auth/validate;
            proxy_pass $upstream_auth_validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;
        }

        # ---------------------------------------------------------------------------
        # Default /api/ catch-all (OPTIONS preflight only — real routes hit blocks below)
        # ---------------------------------------------------------------------------
        location /api/ {
            # CORS headers at location level — applied to ALL responses including errors
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
            add_header 'Access-Control-Expose-Headers'    'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            return 404;
        }

        # ---------------------------------------------------------------------------
        # Auth Service  (/api/v1/auth/*)
        # ---------------------------------------------------------------------------
        location /api/v1/auth {
            # CORS at location level — applied to ALL responses (2xx, 4xx, 5xx)
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
            add_header 'Access-Control-Expose-Headers'    'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            set $upstream_auth http://auth-service:8081;
            proxy_pass $upstream_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Strip any CORS headers the upstream may send — nginx owns CORS here
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }

        # ---------------------------------------------------------------------------
        # User Service — authenticated  (/api/v1/users/*)
        # ---------------------------------------------------------------------------
        location /api/v1/users {
            # CORS at location level — applied to ALL responses (2xx, 4xx, 5xx)
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
            add_header 'Access-Control-Expose-Headers'    'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            auth_request /auth-verify;
            auth_request_set $auth_user_id    $upstream_http_x_user_id;
            auth_request_set $auth_user_email $upstream_http_x_user_email;
            auth_request_set $auth_user_role  $upstream_http_x_user_role;

            set $upstream_user http://user-service:8082;
            proxy_pass $upstream_user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            # Pass verified identity downstream
            proxy_set_header X-User-Id    $auth_user_id;
            proxy_set_header X-User-Email $auth_user_email;
            proxy_set_header X-User-Role  $auth_user_role;
        }

        # ---------------------------------------------------------------------------
        # User Service — public profiles  (/api/v1/public/profile/*)
        # ---------------------------------------------------------------------------
        location /api/v1/public/profile {
            # CORS at location level — applied to ALL responses (2xx, 4xx, 5xx)
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
            add_header 'Access-Control-Expose-Headers'    'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            set $upstream_user_public http://user-service:8082;
            proxy_pass $upstream_user_public;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }

        # ---------------------------------------------------------------------------
        # Contract Service — authenticated  (/api/v1/contracts/*)
        # ---------------------------------------------------------------------------
        location /api/v1/contracts {
            # CORS at location level — applied to ALL responses (2xx, 4xx, 5xx)
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
            add_header 'Access-Control-Expose-Headers'    'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            auth_request /auth-verify;
            auth_request_set $auth_user_id    $upstream_http_x_user_id;
            auth_request_set $auth_user_email $upstream_http_x_user_email;
            auth_request_set $auth_user_role  $upstream_http_x_user_role;

            set $upstream_contract http://contract-service:8083;
            proxy_pass $upstream_contract;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            # Pass verified identity downstream
            proxy_set_header X-User-Id    $auth_user_id;
            proxy_set_header X-User-Email $auth_user_email;
            proxy_set_header X-User-Role  $auth_user_role;

            # Support large file uploads
            client_max_body_size 20M;
        }

        # ---------------------------------------------------------------------------
        # Contract Service — public  (/api/v1/public/contracts/*)
        # ---------------------------------------------------------------------------
        location /api/v1/public/contracts {
            # CORS at location level — applied to ALL responses (2xx, 4xx, 5xx)
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
            add_header 'Access-Control-Expose-Headers'    'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            set $upstream_contract_public http://contract-service:8083;
            proxy_pass $upstream_contract_public;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }

        # ---------------------------------------------------------------------------
        # Blockchain Service  (/api/v1/blockchain/*)
        # ---------------------------------------------------------------------------
        location /api/v1/blockchain {
            # CORS at location level — applied to ALL responses (2xx, 4xx, 5xx)
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
            add_header 'Access-Control-Expose-Headers'    'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            set $upstream_blockchain http://blockchain-service:8084;
            proxy_pass $upstream_blockchain;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }

        # ---------------------------------------------------------------------------
        # Blockchain Service — Wallets  (/api/v1/wallets/*)
        # ---------------------------------------------------------------------------
        location /api/v1/wallets {
            # CORS at location level — applied to ALL responses (2xx, 4xx, 5xx)
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
            add_header 'Access-Control-Expose-Headers'    'Content-Length,Content-Range' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            set $upstream_wallets http://blockchain-service:8084;
            proxy_pass $upstream_wallets;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }

        # ---------------------------------------------------------------------------
        # Default fallback
        # ---------------------------------------------------------------------------
        location / {
            default_type application/json;
            return 404 '{"error": "route not found in gateway"}';
        }
    }
}
