events {
    worker_connections 1024;
}

http {
    # Logging configuration
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Common security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    server {
        listen 80;
        server_name localhost api.defellix.com;

        # Enable CORS for all routes
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Handle Preflight requests globally
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Health Check for the Gateway itself
        location /health {
            default_type application/json;
            return 200 '{"status":"ok", "service":"gateway"}';
        }

        # Swagger API Documentation
        location /api-docs/ {
            proxy_pass http://swagger-ui:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth Service Routes (matches /api/v1/auth/*)
        location /api/v1/auth {
            proxy_pass http://auth-service:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Internal JWT Validation Endpoint
        location = /auth-verify {
            internal;
            proxy_pass http://auth-service:8081/api/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Host $host;
        }

        # User Service Routes (matches /api/v1/users/* and /api/v1/public/profile/*)
        location /api/v1/users {
            # Only apply auth_request if the request doesn't explicitly bypass it (like public profiles)
            # Actually, `api/v1/users` except `/public/` should be authenticated.
            # Gateway offloads auth check:
            auth_request /auth-verify;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_email $upstream_http_x_user_email;
            auth_request_set $auth_user_role $upstream_http_x_user_role;

            proxy_pass http://user-service:8082;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Pass verified context downstream
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Email $auth_user_email;
            proxy_set_header X-User-Role $auth_user_role;
        }
        location /api/v1/public/profile {
            proxy_pass http://user-service:8082;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Contract Service Routes (matches /api/v1/contracts/* and /api/v1/public/contracts/*)
        location /api/v1/contracts {
            auth_request /auth-verify;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_email $upstream_http_x_user_email;
            auth_request_set $auth_user_role $upstream_http_x_user_role;

            proxy_pass http://contract-service:8083;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Pass verified context downstream
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Email $auth_user_email;
            proxy_set_header X-User-Role $auth_user_role;
        }
        location /api/v1/public/contracts {
            proxy_pass http://contract-service:8083;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Blockchain Service Routes (Internal API, but exposed to gateway if needed by frontend)
        location /api/v1/blockchain {
            proxy_pass http://blockchain-service:8084;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/wallets {
            proxy_pass http://blockchain-service:8084;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Default fallback
        location / {
            default_type application/json;
            return 404 '{"error": "route not found in gateway"}';
        }
    }
}
