version: '3.8'

services:
  # API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: defellix-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - contract-service
      - blockchain-service
    networks:
      - defellix-network
    restart: always

  # Auth Service
  auth-service:
    build:
      context: ./services/auth-service
    container_name: defellix-auth
    networks:
      - defellix-network
    restart: always
    environment:
      - SERVER_PORT=8081
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=defellix.support@gmail.com
      - SMTP_PASS=zpkb eubi vxlp bmfk
      - SMTP_FROM_NAME=Defellix Auth

  # User Service
  user-service:
    build:
      context: ./services/user-service
    container_name: defellix-user
    depends_on:
      - auth-service
    networks:
      - defellix-network
    restart: always
    environment:
      - SERVER_PORT=8082
      - AUTH_SERVICE_URL=http://auth-service:8081
      - CONTRACT_SERVICE_URL=http://contract-service:8083

  # Contract Service
  contract-service:
    build:
      context: ./services/contract-service
    container_name: defellix-contract
    depends_on:
      - auth-service
      - blockchain-service
    networks:
      - defellix-network
    restart: always
    environment:
      - SERVER_PORT=8083
      - BLOCKCHAIN_SERVICE_URL=http://blockchain-service:8084
      - SHAREABLE_LINK_BASE_URL=http://localhost:5173/review-contract
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=defellix.support@gmail.com
      - SMTP_PASS=zpkb eubi vxlp bmfk
      - SMTP_FROM_NAME=Defellix Contracts
    env_file:
      - ./services/contract-service/.env

  # Blockchain Service
  blockchain-service:
    build:
      context: ./services/blockchain-service
    container_name: defellix-blockchain
    depends_on:
      - auth-service
    networks:
      - defellix-network
    restart: always
    environment:
      - SERVER_PORT=8084
    env_file:
      - ./services/blockchain-service/.env

  # API Documentation (Swagger UI)
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: defellix-swagger
    environment:
      - SWAGGER_JSON=/openapi.yaml
    volumes:
      - ../openapi.yaml:/openapi.yaml:ro
    networks:
      - defellix-network
    restart: always

networks:
  defellix-network:
    driver: bridge
